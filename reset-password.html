<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>Obnova hesla — SoulQ</title>
  <style>
    :root {
      --primary: #047283;
      --primary-hover: #035c6a;
      --bg: #f7ffff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --success-bg: #ecfdf5;
      --success-text: #047857;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111121;
        --card: #1c1b29;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: #334155;
        --error-bg: #2a1414;
        --error-text: #fca5a5;
        --success-bg: #102a1f;
        --success-text: #6ee7b7;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -0.01em;
    }
    p.lead {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 120ms ease;
    }
    input[type="password"]:focus {
      border-color: var(--primary);
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 120ms ease, opacity 120ms ease;
    }
    button:hover:not(:disabled) { background: var(--primary-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .alert.error { background: var(--error-bg); color: var(--error-text); }
    .alert.success { background: var(--success-bg); color: var(--success-text); }
    .hidden { display: none !important; }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <h1>Nastavit nové heslo</h1>
    <p class="lead">Zadej nové heslo ke svému účtu SoulQ. Heslo musí mít alespoň 8 znaků.</p>

    <div id="status" class="alert hidden"></div>

    <div id="loading">
      <p class="lead"><span class="spinner"></span>Ověřuji odkaz…</p>
    </div>

    <form id="form" class="hidden" autocomplete="off" novalidate>
      <label for="password">Nové heslo</label>
      <input id="password" name="password" type="password" minlength="8" required autocomplete="new-password" />

      <label for="confirm">Heslo znovu</label>
      <input id="confirm" name="confirm" type="password" minlength="8" required autocomplete="new-password" />

      <button id="submit" type="submit">Uložit nové heslo</button>
    </form>

    <p class="footer">Po uložení se vrať do aplikace SoulQ a přihlas se novým heslem.</p>
  </main>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // === Konfigurace (anon key je veřejný — chráněno přes RLS) ===
    const SUPABASE_URL = "https://mtyjxasthlbukolfkupa.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10eWp4YXN0aGxidWtvbGZrdXBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTAxNjEsImV4cCI6MjA5MTgyNjE2MX0.SHRv79B02LNaSekgBnVmtLPPSZO8f-8n3kPkA4o4SFM";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { flowType: "pkce", detectSessionInUrl: true, persistSession: false },
    });

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const loadingEl = $("loading");
    const formEl = $("form");
    const submitBtn = $("submit");

    function showError(msg) {
      statusEl.className = "alert error";
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }
    function showSuccess(msg) {
      statusEl.className = "alert success";
      statusEl.textContent = msg;
      statusEl.classList.remove("hidden");
    }
    function setLoading(on, label = "Uložit nové heslo") {
      submitBtn.disabled = on;
      submitBtn.innerHTML = on ? '<span class="spinner"></span>Ukládám…' : label;
    }

    async function init() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      const tokenHash = url.searchParams.get("token_hash");
      const type = url.searchParams.get("type");
      const errorDescription = url.searchParams.get("error_description");

      if (errorDescription) {
        loadingEl.classList.add("hidden");
        showError(decodeURIComponent(errorDescription).replace(/\+/g, " "));
        return;
      }

      try {
        if (code) {
          // PKCE flow
          const { error } = await supabase.auth.exchangeCodeForSession(code);
          if (error) throw error;
        } else if (tokenHash && type === "recovery") {
          // Token hash flow
          const { error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type: "recovery" });
          if (error) throw error;
        } else {
          // Maybe SDK already processed the URL on load — verify session exists
          const { data: { session } } = await supabase.auth.getSession();
          if (!session) {
            throw new Error("Tento odkaz není platný nebo už vypršel. Vyžádej si v aplikaci nový email pro obnovu hesla.");
          }
        }
        loadingEl.classList.add("hidden");
        formEl.classList.remove("hidden");
        $("password").focus();
      } catch (err) {
        loadingEl.classList.add("hidden");
        showError(err?.message ?? "Nepodařilo se ověřit odkaz.");
      }
    }

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const pw = $("password").value;
      const confirm = $("confirm").value;
      statusEl.classList.add("hidden");

      if (pw.length < 8) return showError("Heslo musí mít alespoň 8 znaků.");
      if (pw !== confirm) return showError("Hesla se neshodují.");

      setLoading(true);
      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) throw error;
        formEl.classList.add("hidden");
        showSuccess("Heslo bylo úspěšně změněno. Vrať se do aplikace SoulQ a přihlas se.");
        await supabase.auth.signOut();
      } catch (err) {
        showError(err?.message ?? "Nepodařilo se uložit nové heslo.");
      } finally {
        setLoading(false);
      }
    });

    init();
  </script>
</body>
</html>
